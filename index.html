body {

.container { width:100%; max-width:580px; }
.card {

.header { text-align:center; margin-bottom:28px; }
.header .tag {

  padding:5px 16px; border-radius:20px; margin-bottom:14px; font-weight:700;
}
.header h1 { font-size:26px; font-weight:900; color:#0077b6; margin-bottom:4px; }
.header .sub { font-size:16px; color:#555; }
 
.today-course {
  background:#e8f4f8; border:2px solid #0077b6;
  border-radius:12px; padding:18px 20px; margin-bottom:24px;
  text-align:center;
}
.today-course .label { font-size:13px; color:#0077b6; font-weight:700; margin-bottom:6px; letter-spacing:1px; }
.today-course .name { font-size:22px; font-weight:900; color:#0077b6; margin-bottom:6px; }
.today-course .desc { font-size:15px; color:#555; line-height:1.6; margin-bottom:4px; }
.today-course .date { font-size:14px; color:#888; }
 
.no-course {
  background:#fff3e0; border:2px solid #ffcc80;
  border-radius:12px; padding:24px 20px; margin-bottom:24px;
  text-align:center; font-size:18px; color:#e65100; font-weight:700;
}
 
.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:16px; font-weight:700; color:#333; margin-bottom:8px; }
.form-group input {
  width:100%; padding:14px 16px; font-size:18px;
  background:#f9fafb; border:2px solid #ddd;
  border-radius:10px; color:#1a1a1a; outline:none;
  font-family:'Noto Sans TC',sans-serif;
  transition:border-color 0.2s;
}
.form-group input:focus { border-color:#0077b6; }
 
.info-bar {
  display:none;
  background:#e8f4f8; border:2px solid #b2d8e8;
  border-radius:10px; padding:16px 18px; margin-bottom:20px;
  position:relative;
}
.info-bar .info-row { display:flex; gap:20px; flex-wrap:wrap; }
.info-bar .info-item { font-size:17px; color:#333; }
.info-bar .info-item span { color:#0077b6; font-weight:700; }
.info-bar .badge {
  display:inline-block; margin-top:10px;
  padding:4px 12px; border-radius:12px; font-size:13px; font-weight:700;
}
.info-bar .badge.enrolled { background:#c8e6c9; color:#2e7d32; }
.info-bar .badge.walkin { background:#ffe0b2; color:#e65100; }
 
.walkin-notice {
  display:none;
  background:#fff3e0; border:2px solid #ffcc80;
  border-radius:10px; padding:14px 18px; margin-bottom:20px;
  font-size:16px; color:#e65100; font-weight:500;
}
.walkin-fields { display:none; }
 
.submit-btn {
  display:none; width:100%; padding:16px;
  background:#0077b6; border:none; border-radius:12px; color:#fff;
  font-size:19px; font-weight:700; cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  transition:background 0.2s;
}
.submit-btn:hover { background:#005f8a; }
.submit-btn:disabled { opacity:0.5; cursor:not-allowed; }
 
.list-btn {
  width:100%; padding:14px;
  background:#fff; border:2px solid #0077b6;
  border-radius:12px; color:#0077b6;
  font-size:17px; font-weight:700; cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  transition:all 0.2s; margin-top:12px;

.list-btn:hover { background:#e8f4f8; }
 
.result-msg {

.result-msg.success { background:#e8f5e9; border:2px solid #81c784; color:#2e7d32; }
.result-msg.error { background:#ffebee; border:2px solid #e57373; color:#c62828; }
 
.modal-overlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.4); z-index:100;
  justify-content:center; align-items:center; padding:16px;

.modal-overlay.show { display:flex; }
.modal {

function callAPIOnce(params, callback) {
  var cbName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
  var timeoutId;
  var done = false;
 
  window[cbName] = function(data) {
    if (done) return;
    done = true;
    clearTimeout(timeoutId);
    callback(null, data);
    cleanup();
  };
 
  function cleanup() {
    try { delete window[cbName]; } catch(e) { window[cbName] = undefined; }
    var s = document.getElementById(cbName);
    if (s && s.parentNode) s.parentNode.removeChild(s);
  }
 
  var qsParams = Object.assign({}, params, { callback: cbName });
  var qs = Object.keys(qsParams).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(qsParams[k]);
  }).join('&');
 
  var script = document.createElement('script');
  script.id = cbName;
  script.src = API_URL + '?' + qs;
  script.onerror = function() {
    if (done) return;
    done = true;
    clearTimeout(timeoutId);
    callback(new Error('Network error'), null);
    cleanup();
  };
 
  timeoutId = setTimeout(function() {
    if (done) return;
    done = true;
    callback(new Error('Timeout'), null);
    cleanup();
  }, 12000);
 
  document.body.appendChild(script);
}

    if (err) {
      setTimeout(function() {
        callAPIOnce(params, callback);
      }, 500);
    } else {
      callback(null, data);
    }
  });
}
 
// ===== 前端判斷今日課程 =====
function getTodayCourseLocal() {
  var d = new Date();
  var today = d.getFullYear() + '/' +
    String(d.getMonth() + 1).padStart(2, '0') + '/' +
    String(d.getDate()).padStart(2, '0');
  for (var i = 0; i < ALL_COURSES.length; i++) {
    if (COURSE_DATES[ALL_COURSES[i]] === today) {
      var info = COURSE_INFO[ALL_COURSES[i]];
      return { found: true, name: ALL_COURSES[i], desc: info.desc, rocDate: info.rocDate };
    }
  }
  return { found: false };
}
 
(function initTodayCourse() {
  var card = document.getElementById('todayCourseCard');
  var result = getTodayCourseLocal();
  if (result.found) {
    todayCourse = result.name;
    card.innerHTML = '<div class="today-course">'
      + '<div class="label">📅 今日課程</div>'
      + '<div class="name">' + result.name + '</div>'
      + '<div class="desc">' + result.desc + '</div>'
      + '<div class="date">' + result.rocDate + '</div>'
      + '</div>';
    document.getElementById('checkinForm').style.display = 'block';
    callAPIOnce({ action: 'ping' }, function() {});
  } else {
    card.innerHTML = '<div class="no-course">今日無課程，無需簽到</div>';
  }
})();
 
var empIdInput = document.getElementById('empId');
empIdInput.addEventListener('input', function() {
  clearTimeout(debounceTimer);
  var val = empIdInput.value.trim();
  resetUI();
  if (val.length >= 4) {
    doLookup(val);
  }
});
 
function resetUI() {
  currentInfo = null;
  document.getElementById('infoBar').style.display = 'none';
  document.getElementById('walkinNotice').style.display = 'none';
  document.getElementById('walkinFields').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('resultMsg').style.display = 'none';
  document.getElementById('dispBadge').style.display = 'none';
}
 
// ===== Lookup 邏輯：員工資料 + 今日報名狀態 =====
function doLookup(val) {
  var key = val.toUpperCase().trim();
  var info = ROSTER[key];
  var badge = document.getElementById('dispBadge');
 
  if (info) {
    // 找到員工資料
    var isEnrolled = !!(todayCourse && ENROLLED[todayCourse] && ENROLLED[todayCourse][key]);
    currentInfo = { found: true, enrolled: isEnrolled, name: info.name, unit: info.unit, title: info.title };
 
    document.getElementById('dispName').textContent = info.name;
    document.getElementById('dispUnit').textContent = info.unit;
    document.getElementById('dispTitle').textContent = info.title;
    document.getElementById('infoBar').style.display = 'block';
 
    if (isEnrolled) {
      badge.textContent = '✓ 已報名';
      badge.className = 'badge enrolled';
    } else {
      badge.textContent = '⚠ 不在今日報名名單（將以現場參與身份簽到）';
      badge.className = 'badge walkin';
    }
    badge.style.display = 'inline-block';
  } else {
    // 完全找不到，需要手填
    currentInfo = { found: false, enrolled: false };
    document.getElementById('walkinNotice').style.display = 'block';
    document.getElementById('walkinFields').style.display = 'block';
  }
  document.getElementById('submitBtn').style.display = 'block';
}
 
function doCheckIn() {
  var btn = document.getElementById('submitBtn');
  if (btn.disabled) return;
 
  var empId = document.getElementById('empId').value.trim();
  if (!empId) { showResult('請輸入人事號', false); return; }
 
  var params = {
    action: 'checkIn',
    empId: empId,
    course: todayCourse,
    name: '',
    unit: '',
    title: '',
    isWalkIn: 'false'
  };
 
  if (currentInfo && currentInfo.found) {
    // 有員工資料
    params.name = currentInfo.name;
    params.unit = currentInfo.unit;
    params.title = currentInfo.title;
    // 沒在今日報名名單 → 仍標示為現場參與
    params.isWalkIn = currentInfo.enrolled ? 'false' : 'true';
  } else {
    // 完全外部訪客
    params.isWalkIn = 'true';
    params.name = document.getElementById('walkinName').value.trim();
    params.unit = document.getElementById('walkinUnit').value.trim();
    if (!params.name || !params.unit) {
      showResult('請填寫姓名與單位', false);
      return;
    }
  }
 
  btn.disabled = true;
  btn.textContent = '簽到中...';
 
  callAPI(params, function(err, result) {
    if (err) {
      showResult('簽到失敗，請重試', false);
      btn.disabled = false;
      btn.textContent = '簽 到';
      return;
    }
    showResult(result.message, result.success);
    if (result.success) {
      document.getElementById('empId').value = '';
      setTimeout(function() {
        btn.disabled = false;
        btn.textContent = '簽 到';
        resetUI();
        empIdInput.focus();
      }, 1500);
    } else {
      btn.disabled = false;
      btn.textContent = '簽 到';
    }
  });
}
 
function showResult(msg, success) {
  var el = document.getElementById('resultMsg');
  el.textContent = msg;
  el.className = 'result-msg ' + (success ? 'success' : 'error');
  el.style.display = 'block';
}
 
// ===== 簽到名單 Modal =====
function openAttendanceModal() {
  document.getElementById('modalOverlay').classList.add('show');
  renderModalTabs();
  loadAttendance(todayCourse || ALL_COURSES[0]);
}
 
function renderModalTabs() {
  var container = document.getElementById('modalTabs');
  container.innerHTML = '';
  for (var i = 0; i < ALL_COURSES.length; i++) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tab-btn';
    btn.textContent = ALL_COURSES[i];
    btn.setAttribute('data-course', ALL_COURSES[i]);
    (function(c, b) {
      b.onclick = function() { loadAttendance(c); };
    })(ALL_COURSES[i], btn);
    container.appendChild(btn);
  }
}
 
function loadAttendance(course) {
  var tabs = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < tabs.length; i++) {
    if (tabs[i].getAttribute('data-course') === course) {
      tabs[i].classList.add('active');
    } else {
      tabs[i].classList.remove('active');
    }
  }
  document.getElementById('modalContent').innerHTML = '<div class="loading">載入中...</div>';
 
  callAPI({ action: 'attendance', course: course }, function(err, list) {
    if (err || !Array.isArray(list)) {
      document.getElementById('modalContent').innerHTML = '<div style="color:red;padding:16px;">載入失敗</div>';
      return;
    }
    var html = '<div class="count">共 ' + list.length + ' 人已簽到</div>';
    if (list.length === 0) {
      html += '<div style="text-align:center;padding:24px;color:#888;">尚無簽到紀錄</div>';
    } else {
      html += '<table><tr><th>#</th><th>姓名</th><th>單位</th><th>職稱</th><th>類別</th><th>時間</th></tr>';
      for (var i = 0; i < list.length; i++) {
        var r = list[i];
        html += '<tr><td>' + (i+1) + '</td><td>' + r.name + '</td><td>' + r.unit + '</td><td>' + r.title + '</td><td>' + r.type + '</td><td style="font-size:13px;color:#888;">' + r.time + '</td></tr>';
      }
      html += '</table>';
    }
    document.getElementById('modalContent').innerHTML = html;
  });
}
 
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
</script>
